<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Swagger UI</title>
    <link rel="stylesheet" href="{{.AssetsURL}}/swagger-ui.css" integrity="sha512-xMCEx1YGY9/YdKYbdQB0N6ZvxbjTT10OnbvJfDcnkxE0P3UjV0jqsK0yrzVGH1OCOdV7CYzCBiqLl+/7g8ZpRQ==" crossorigin="anonymous">
    <style>
      html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
      *, *:before, *:after { box-sizing: inherit; }
      body { margin:0; background: #fafafa; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="{{.AssetsURL}}/swagger-ui-bundle.js" integrity="sha512-kno2yb8YpUmSvcghCxCil8pDPkZMVgK3FdZdt8nhTNqEr7Tz03TM/ap63nKTo9tHNV4OTxRzCtOftV3c9/5tkw==" crossorigin="anonymous"></script>
    <script src="{{.AssetsURL}}/swagger-ui-standalone-preset.js" integrity="sha512-H7SesVTj7lbn2iSqaUkLrl4Pyi74zOvqYm5hv3ViBxWmI5cS/JMo18KTG+F9muxCeomR4XxxTFGEzMuiSyX4wQ==" crossorigin="anonymous"></script>
    <script>
    window.onload = function() {
      let ui
    		ui = SwaggerUIBundle({
    		  url: "{{.JSONURL}}",
    		  dom_id: '#swagger-ui',
        persistAuthorization: true,
        deepLinking: true,
        requestInterceptor: function(request) {
          if (!ui) {
            return request
          }
          const authorized = ui.authSelectors.authorized().toJS()
          const bearer = authorized.BearerAuth
          if (bearer && bearer.value) {
            const hasPrefix = bearer.value.toLowerCase().startsWith("bearer ")
            request.headers.Authorization = hasPrefix ? bearer.value : "Bearer " + bearer.value
          }
          return request
        },
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout"
      })
      window.ui = ui
    }
    </script>
</body>
</html>
